  <!-- Structured Data: FAQ Schema for AEO -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does an internet speed test work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A speed test works by downloading and uploading data to a server while measuring the time it takes. Download speed is measured by fetching large files from a CDN, upload speed by sending data to a server, and ping by measuring round-trip time of small requests."
          }
        },
        {
          "@type": "Question",
          "name": "What is a good internet speed?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A good internet speed depends on your usage. For basic browsing, 10-25 Mbps is sufficient. For HD streaming, 25-50 Mbps is recommended. For 4K streaming and online gaming, 50-100+ Mbps is ideal. Upload speeds of 10+ Mbps are good for video calls."
          }
        },
        {
          "@type": "Question",
          "name": "What is ping and jitter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ping (latency) is the time it takes for data to travel from your device to a server and back, measured in milliseconds. Lower ping means more responsive connections. Jitter is the variation in ping over time — low jitter means a more stable connection."
          }
        },
        {
          "@type": "Question",
          "name": "Why is my internet speed slow?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Slow internet can be caused by network congestion, distance from your router, outdated hardware, ISP throttling, too many connected devices, or interference from walls and other electronics. Try restarting your router or connecting via ethernet."
          }
        },
        {
          "@type": "Question",
          "name": "Is TurboTest free to use?",

            "text": "Yes, TurboTest is 100% free to use with no ads, no sign-ups, and no data collection. It works directly in your browser on any device."
          }
        }
      ]
    }
    </script>
